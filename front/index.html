<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Universitário - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex flex-col items-center justify-center p-4">

    <div id="toast" class="fixed top-5 right-5 z-50 px-6 py-3 rounded-lg shadow-lg text-white font-semibold transition-opacity opacity-0 pointer-events-none">
        <span id="toast-message"></span>
    </div>

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md fade-in border border-gray-100">
        <div class="text-center mb-8">
            <div class="bg-indigo-100 text-indigo-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="graduation-cap" class="w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Gestor Universitário</h1>
            <p class="text-gray-500 text-sm mt-2" id="auth-subtitle">Faça login para aceder ao painel</p>
        </div>

        <form id="form-login" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">E-mail</label>
                <input type="email" id="login-email" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Palavra-passe</label>
                <input type="password" id="login-senha" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-2 px-4 rounded-lg hover:bg-indigo-700 transition font-medium">Entrar</button>
            <p class="text-center text-sm text-gray-600 mt-4">Não tem uma conta? <a href="#" id="toggle-to-register" class="text-indigo-600 hover:underline">Registe-se</a></p>
        </form>

        <form id="form-register" class="space-y-4 hidden">
            <div>
                <label class="block text-sm font-medium text-gray-700">Nome Completo</label>
                <input type="text" id="reg-nome" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">E-mail</label>
                <input type="email" id="reg-email" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Palavra-passe</label>
                <input type="password" id="reg-senha" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <button type="submit" class="w-full bg-green-600 text-white py-2 px-4 rounded-lg hover:bg-green-700 transition font-medium">Criar Conta</button>
            <p class="text-center text-sm text-gray-600 mt-4">Já tem uma conta? <a href="#" id="toggle-to-login" class="text-indigo-600 hover:underline">Faça login</a></p>
        </form>
    </div>

    <script>
        lucide.createIcons();
        const API_URL = 'http://localhost:8080';

        function mostrarToast(msg, tipo = 'bg-red-500') {
            const toast = document.getElementById('toast');
            const txt = document.getElementById('toast-message');
            txt.innerText = msg;
            toast.className = `fixed top-5 right-5 z-50 px-6 py-3 rounded-lg shadow-lg text-white font-semibold transition-opacity opacity-100 ${tipo}`;
            setTimeout(() => toast.className = toast.className.replace('opacity-100', 'opacity-0'), 3000);
        }

        document.getElementById('toggle-to-register').onclick = (e) => {
            e.preventDefault();
            document.getElementById('form-login').classList.add('hidden');
            document.getElementById('form-register').classList.remove('hidden');
            document.getElementById('auth-subtitle').innerText = "Crie a sua conta para iniciar";
        };

        document.getElementById('toggle-to-login').onclick = (e) => {
            e.preventDefault();
            document.getElementById('form-register').classList.add('hidden');
            document.getElementById('form-login').classList.remove('hidden');
            document.getElementById('auth-subtitle').innerText = "Faça login para aceder ao painel";
        };

        document.getElementById('form-register').addEventListener('submit', async (e) => {
            e.preventDefault();
            const dto = {
                nome: document.getElementById('reg-nome').value,
                email: document.getElementById('reg-email').value,
                senha: document.getElementById('reg-senha').value
            };
            try {
                const res = await fetch(`${API_URL}/usuarios/cadastrar`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(dto) });
                if(res.ok) {
                    mostrarToast('Conta criada! Faça login.', 'bg-green-500');
                    document.getElementById('toggle-to-login').click();
                } else throw new Error();
            } catch(err) { mostrarToast('Erro ao criar conta.', 'bg-red-500'); }
        });

        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const dto = {
                email: document.getElementById('login-email').value,
                senha: document.getElementById('login-senha').value
            };
            try {
                const res = await fetch(`${API_URL}/usuarios/login`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(dto) });
                if(res.ok) {
                    window.location.href = 'dashboard.html';
                } else {
                    mostrarToast('E-mail ou Palavra-passe incorretos.', 'bg-red-500');
                }
            } catch(err) { mostrarToast('Erro de conexão com a API.', 'bg-red-500'); }
        });
    </script>
</body>
</html>
