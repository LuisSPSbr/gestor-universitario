<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Gestor Universitário</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex flex-col">

    <nav class="bg-indigo-600 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-3">
                    <i data-lucide="graduation-cap" class="w-8 h-8"></i>
                    <span class="font-bold text-xl tracking-tight">O Meu Gestor Universitário</span>
                </div>
                <div class="flex items-center space-x-6">
                    <a href="dashboard.html" class="text-white font-medium border-b-2 border-white pb-1">O Meu Resumo</a>
                    <a href="despesas.html" class="text-indigo-200 hover:text-white font-medium transition">Despesas</a>
                    <a href="index.html" class="flex items-center space-x-1 bg-indigo-700 hover:bg-indigo-800 px-3 py-1.5 rounded-md transition">
                        <i data-lucide="log-out" class="w-4 h-4"></i><span>Sair</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto w-full px-4 py-8">
        <h2 class="text-2xl font-bold text-gray-800 border-b pb-2 mb-6">Visão Geral Financeira</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center space-x-4">
                <div class="bg-blue-100 text-blue-600 p-3 rounded-lg"><i data-lucide="users" class="w-8 h-8"></i></div>
                <div><p class="text-sm font-medium text-gray-500">Utilizadores na Plataforma</p><h3 class="text-2xl font-bold" id="dash-alunos">-</h3></div>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center space-x-4">
                <div class="bg-green-100 text-green-600 p-3 rounded-lg"><i data-lucide="trending-up" class="w-8 h-8"></i></div>
                <div><p class="text-sm font-medium text-gray-500">Débitos Pagos</p><h3 class="text-2xl font-bold" id="dash-pago">-</h3></div>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center space-x-4">
                <div class="bg-yellow-100 text-yellow-600 p-3 rounded-lg"><i data-lucide="clock" class="w-8 h-8"></i></div>
                <div><p class="text-sm font-medium text-gray-500">Débitos Pendentes</p><h3 class="text-2xl font-bold" id="dash-pendente">-</h3></div>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center space-x-4">
                <div class="bg-purple-100 text-purple-600 p-3 rounded-lg"><i data-lucide="file-text" class="w-8 h-8"></i></div>
                <div><p class="text-sm font-medium text-gray-500">Total de Registos</p><h3 class="text-2xl font-bold" id="dash-total">-</h3></div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const API_URL = 'http://localhost:8080';
        const formatadorMoeda = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });

        async function carregarDashboard() {
            try {
                const response = await fetch(`${API_URL}/dashboard/resumo`);
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('dash-alunos').innerText = data.totalAlunosAtivos;
                    document.getElementById('dash-pago').innerText = formatadorMoeda.format(data.receitaJaArrecadada);
                    document.getElementById('dash-pendente').innerText = formatadorMoeda.format(data.receitaPendente);
                    document.getElementById('dash-total').innerText = data.totalDeMensalidadesRegistradas;
                }
            } catch (error) {
                console.error("Erro ao carregar dashboard:", error);
            }
        }
        carregarDashboard();
    </script>
</body>
</html>
