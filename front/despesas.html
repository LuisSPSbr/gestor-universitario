<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>As Minhas Despesas - Gestor Universitário</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex flex-col">

    <div id="toast" class="fixed top-5 right-5 z-50 px-6 py-3 rounded-lg shadow-lg text-white font-semibold transition-opacity opacity-0 pointer-events-none">
        <span id="toast-message"></span>
    </div>

    <nav class="bg-indigo-600 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-3">
                    <i data-lucide="graduation-cap" class="w-8 h-8"></i>
                    <span class="font-bold text-xl tracking-tight">Meu Gestor Universitário</span>
                </div>
                <div class="flex items-center space-x-6">
                    <a href="dashboard.html" class="text-indigo-200 hover:text-white font-medium transition">O Meu Resumo</a>
                    <a href="despesas.html" class="text-white font-medium border-b-2 border-white pb-1">Despesas</a>
                    <a href="index.html" class="flex items-center space-x-1 bg-indigo-700 hover:bg-indigo-800 px-3 py-1.5 rounded-md transition">
                        <i data-lucide="log-out" class="w-4 h-4"></i><span>Sair</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto w-full px-4 py-8">
        <div class="flex justify-between items-end mb-6">
            <h1 class="text-3xl font-bold text-indigo-900">A Minha Gestão de Despesas</h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-red-50 border border-red-200 rounded-xl p-6 flex items-center space-x-4 shadow-sm">
                <div class="bg-red-100 text-red-600 p-3 rounded-full">
                    <i data-lucide="alert-triangle" class="w-8 h-8"></i>
                </div>
                <div>
                    <p class="text-sm font-bold text-red-800 uppercase tracking-wide">Débitos em Atraso</p>
                    <h3 class="text-2xl font-black text-red-600" id="card-total-atrasado">R$ 0,00</h3>
                </div>
            </div>

            <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-6 flex items-center space-x-4 shadow-sm">
                <div class="bg-yellow-100 text-yellow-600 p-3 rounded-full">
                    <i data-lucide="clock" class="w-8 h-8"></i>
                </div>
                <div>
                    <p class="text-sm font-bold text-yellow-800 uppercase tracking-wide">A Vencer / Pendente</p>
                    <h3 class="text-2xl font-black text-yellow-600" id="card-total-pendente">R$ 0,00</h3>
                </div>
            </div>

            <div class="bg-green-50 border border-green-200 rounded-xl p-6 flex items-center space-x-4 shadow-sm">
                <div class="bg-green-100 text-green-600 p-3 rounded-full">
                    <i data-lucide="check-circle" class="w-8 h-8"></i>
                </div>
                <div>
                    <p class="text-sm font-bold text-green-800 uppercase tracking-wide">Total Pago</p>
                    <h3 class="text-2xl font-black text-green-600" id="card-total-pago">R$ 0,00</h3>
                </div>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-8">
            <div class="w-full md:w-1/3">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 sticky top-6">
                    <h3 id="form-title" class="text-lg font-bold mb-4 text-gray-800 flex items-center">
                        <i data-lucide="plus-circle" class="w-5 h-5 mr-2 text-indigo-600"></i>Adicionar Gasto
                    </h3>
                    <form id="form-despesa" class="space-y-4">
                        <input type="hidden" id="des-id">
                        <input type="hidden" id="des-alunoId" value="1"> 
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Categoria</label>
                            <select id="des-categoria" required class="mt-1 w-full px-3 py-2 border rounded-md focus:ring-indigo-500 focus:border-indigo-500">
                                <option value="MENSALIDADE">Mensalidade</option>
                                <option value="LIVROS">Livros e Materiais</option>
                                <option value="TRANSPORTE">Transporte</option>
                                <option value="LANCHE">Alimentação/Lanche</option>
                                <option value="OUTROS">Outros Gastos</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Valor (R$)</label>
                            <input type="number" id="des-valor" required step="0.01" class="mt-1 w-full px-3 py-2 border rounded-md focus:ring-indigo-500 focus:border-indigo-500" placeholder="0.00">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Data de Vencimento / Gasto</label>
                            <input type="date" id="des-vencimento" required class="mt-1 w-full px-3 py-2 border rounded-md focus:ring-indigo-500 focus:border-indigo-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Status</label>
                            <select id="des-status" class="mt-1 w-full px-3 py-2 border rounded-md focus:ring-indigo-500 focus:border-indigo-500">
                                <option value="PENDENTE">Pendente</option>
                                <option value="PAGO">Pago</option>
                                <option value="ATRASADO">Atrasado</option>
                            </select>
                        </div>
                        <div class="flex gap-2 pt-2">
                            <button type="submit" class="flex-1 bg-indigo-600 text-white font-medium py-2 rounded-md hover:bg-indigo-700 transition">Salvar</button>
                            <button type="button" id="btn-cancelar" class="hidden flex-1 bg-gray-200 text-gray-700 py-2 rounded-md hover:bg-gray-300 transition">Cancelar</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="w-full md:w-2/3 space-y-8">
                <div class="bg-white rounded-xl shadow-sm border border-red-200 overflow-hidden">
                    <div class="bg-red-50 px-6 py-4 border-b border-red-200 flex justify-between items-center">
                        <h3 class="text-lg font-bold text-red-800 flex items-center">
                            <i data-lucide="bell" class="w-5 h-5 mr-2"></i> Precisa de Atenção (Em Aberto)
                        </h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <tbody id="tabela-abertos" class="divide-y divide-gray-100">
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- LISTA 2: HISTÓRICO GERAL -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="bg-gray-50 px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                        <h3 class="text-lg font-bold text-gray-800 flex items-center">
                            <i data-lucide="list" class="w-5 h-5 mr-2"></i> Histórico Completo
                        </h3>
                        <button onclick="carregarDespesas()" class="text-indigo-600 hover:text-indigo-800" title="Atualizar">
                            <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-white">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-semibold uppercase text-gray-500">Categoria</th>
                                    <th class="px-6 py-3 text-left text-xs font-semibold uppercase text-gray-500">Valor / Data</th>
                                    <th class="px-6 py-3 text-left text-xs font-semibold uppercase text-gray-500">Status</th>
                                    <th class="px-6 py-3 text-right text-xs font-semibold uppercase text-gray-500">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabela-corpo" class="divide-y divide-gray-100"></tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const API_URL = 'http://localhost:8080';
        const form = document.getElementById('form-despesa');
        const formatadorMoeda = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
        
        const categoriaIcones = {
            'MENSALIDADE': 'graduation-cap',
            'LIVROS': 'book-open',
            'TRANSPORTE': 'bus',
            'LANCHE': 'coffee',
            'OUTROS': 'shopping-bag'
        };

        function mostrarToast(msg, tipo = 'bg-red-500') {
            const toast = document.getElementById('toast');
            const txt = document.getElementById('toast-message');
            txt.innerText = msg;
            toast.className = `fixed top-5 right-5 z-50 px-6 py-3 rounded-lg shadow-lg text-white font-semibold transition-opacity opacity-100 ${tipo}`;
            setTimeout(() => toast.className = toast.className.replace('opacity-100', 'opacity-0'), 4000);
        }

        async function carregarDespesas() {
            try {
                const response = await fetch(`${API_URL}/despesas`);
                if (!response.ok) throw new Error();
                const data = await response.json();
                
                const tbodyAbertos = document.getElementById('tabela-abertos');
                const tbodyGeral = document.getElementById('tabela-corpo');
                
                let totalAtrasado = 0;
                let totalPendente = 0;
                let totalPago = 0;

                const despesasAbertas = data.filter(d => d.status === 'ATRASADO' || d.status === 'PENDENTE');
                
                data.forEach(d => {
                    if(d.status === 'ATRASADO') totalAtrasado += d.valor;
                    if(d.status === 'PENDENTE') totalPendente += d.valor;
                    if(d.status === 'PAGO') totalPago += d.valor;
                });

                document.getElementById('card-total-atrasado').innerText = formatadorMoeda.format(totalAtrasado);
                document.getElementById('card-total-pendente').innerText = formatadorMoeda.format(totalPendente);
                document.getElementById('card-total-pago').innerText = formatadorMoeda.format(totalPago);

                if (despesasAbertas.length === 0) {
                    tbodyAbertos.innerHTML = `<tr><td class="px-6 py-4 text-center text-gray-500">Tudo em dia! Não há débitos em aberto. 🎉</td></tr>`;
                } else {
                    tbodyAbertos.innerHTML = despesasAbertas.map(d => renderLinha(d, true)).join('');
                }
                if (data.length === 0) {
                    tbodyGeral.innerHTML = `<tr><td colspan="4" class="px-6 py-4 text-center text-gray-500">Ainda não tem gastos registados.</td></tr>`;
                } else {
                    tbodyGeral.innerHTML = data.map(d => renderLinha(d, false)).join('');
                }

                lucide.createIcons();
            } catch (err) { 
                mostrarToast('Erro ao carregar os seus gastos.', 'bg-red-500'); 
            }
        }

        function renderLinha(d, isAbertoTable) {
            let statusClass = "bg-gray-100 text-gray-800";
            if(d.status === 'PAGO') statusClass = "bg-green-100 text-green-800";
            if(d.status === 'PENDENTE') statusClass = "bg-yellow-100 text-yellow-800";
            if(d.status === 'ATRASADO') statusClass = "bg-red-100 text-red-800 text-bold";
            
            const iconName = categoriaIcones[d.categoria] || 'file';
            const dataFormatada = d.dataVencimento.split('-').reverse().join('/');
            const rowClass = (isAbertoTable && d.status === 'ATRASADO') ? 'bg-red-50 hover:bg-red-100' : 'bg-white hover:bg-gray-50';

            return `
            <tr class="${rowClass} transition-colors">
                <td class="px-6 py-4">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 h-10 w-10 flex items-center justify-center rounded-full bg-indigo-50 text-indigo-600">
                            <i data-lucide="${iconName}" class="w-5 h-5"></i>
                        </div>
                        <div class="ml-4">
                            <div class="text-sm font-bold text-gray-900">${d.categoria}</div>
                        </div>
                    </div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <div class="text-sm font-bold text-gray-900">${formatadorMoeda.format(d.valor)}</div>
                    <div class="text-xs ${d.status === 'ATRASADO' ? 'text-red-500 font-bold' : 'text-gray-500'}">Data: ${dataFormatada}</div>
                </td>
                <td class="px-6 py-4">
                    <span class="px-2 py-1 text-xs font-semibold rounded-full ${statusClass}">${d.status}</span>
                </td>
                <td class="px-6 py-4 text-right">
                    <button onclick='editar(${JSON.stringify(d)})' class="text-indigo-600 hover:text-indigo-900 mr-3" title="Editar"><i data-lucide="edit" class="w-5 h-5 inline"></i></button>
                    <button onclick="remover(${d.id})" class="text-red-600 hover:text-red-900" title="Remover"><i data-lucide="trash-2" class="w-5 h-5 inline"></i></button>
                </td>
            </tr>`;
        }

        function editar(d) {
            document.getElementById('des-id').value = d.id;
            document.getElementById('des-alunoId').value = d.alunoId; 
            document.getElementById('des-categoria').value = d.categoria;
            document.getElementById('des-valor').value = d.valor;
            document.getElementById('des-vencimento').value = d.dataVencimento;
            document.getElementById('des-status').value = d.status;
            
            document.getElementById('form-title').innerHTML = `<i data-lucide="edit" class="w-5 h-5 mr-2 text-indigo-600 inline"></i> Editar Gasto`;
            document.getElementById('btn-cancelar').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            lucide.createIcons();
        }

        async function remover(id) {
            if(!confirm('Tem a certeza que quer remover este gasto?')) return;
            try {
                await fetch(`${API_URL}/despesas/${id}`, { method: 'DELETE' });
                carregarDespesas();
                mostrarToast('Gasto removido!', 'bg-green-500');
            } catch (err) { mostrarToast('Erro ao eliminar.', 'bg-red-500'); }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('des-id').value;
            const dto = {
                alunoId: document.getElementById('des-alunoId').value, 
                categoria: document.getElementById('des-categoria').value,
                valor: document.getElementById('des-valor').value,
                dataVencimento: document.getElementById('des-vencimento').value,
                status: document.getElementById('des-status').value
            };
            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/despesas/${id}` : `${API_URL}/despesas`;

            try {
                const res = await fetch(url, { method, headers: {'Content-Type': 'application/json'}, body: JSON.stringify(dto) });
                
                if(res.ok) {
                    form.reset();
                    document.getElementById('des-id').value = '';
                    document.getElementById('btn-cancelar').classList.add('hidden');
                    document.getElementById('form-title').innerHTML = `<i data-lucide="plus-circle" class="w-5 h-5 mr-2 text-indigo-600 inline"></i>Adicionar Gasto`;
                    carregarDespesas();
                    mostrarToast('Gasto salvo com sucesso!', 'bg-green-500');
                } else {
                    let errorMsg = 'Erro ao guardar no servidor.';
                    try {
                        const errorData = await res.json();
                        if (errorData.message) {
                            errorMsg = errorData.message;
                        } 
                        else if (errorData.errors && errorData.errors.length > 0) {
                            errorMsg = errorData.errors[0].defaultMessage;
                        }
                    } catch (parseErr) {
                        const text = await res.text();
                        if (text) errorMsg = text;
                    }
                    throw new Error(errorMsg);
                }
            } catch (err) { 
                mostrarToast(err.message || 'Erro ao comunicar com o servidor.', 'bg-red-500'); 
            }
        });

        document.getElementById('btn-cancelar').onclick = () => {
            form.reset();
            document.getElementById('des-id').value = '';
            document.getElementById('btn-cancelar').classList.add('hidden');
            document.getElementById('form-title').innerHTML = `<i data-lucide="plus-circle" class="w-5 h-5 mr-2 text-indigo-600 inline"></i>Adicionar Gasto`;
        };

        carregarDespesas();
    </script>
</body>
</html>
